<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carlos's Vault</title>

<style>
  body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: radial-gradient(circle at center, #1a1a1a 0%, #000 70%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .vault-container {
    width: 95%;
    max-width: 650px;
    background: linear-gradient(145deg, #2b2b2b, #111);
    border-radius: 18px;
    padding: 25px 30px;
    border: 4px solid #444;
    box-shadow: inset 0 0 25px rgba(0,0,0,0.9),
                0 0 25px rgba(255,0,0,0.2);
  }

  .vault-door {
    width: 80px;
    height: 80px;
    border: 5px solid #555;
    border-radius: 50%;
    margin: 0 auto 20px auto;
    background: radial-gradient(circle, #333 0%, #111 80%);
    box-shadow: inset 0 0 15px black, 0 0 10px #333;
  }

  h1 {
    text-align: center;
    color: red;
    font-weight: bold;
    font-size: 32px;
    letter-spacing: 3px;
    margin-bottom: 25px;
    text-shadow: 0 0 8px red;
  }

  .game {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(145deg, #0f1f3a, #081225);
    padding: 14px 16px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 2px solid #333;
    transition: 0.2s ease;
  }

  .game:hover {
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(255,0,0,0.4);
  }

  .game span {
    color: red;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0 0 4px red;
  }

  .download-btn {
    background: #222;
    color: red;
    font-weight: bold;
    padding: 6px 14px;
    text-decoration: none;
    border-radius: 6px;
    border: 2px solid red;
    font-size: 13px;
    transition: 0.2s ease;
  }

  .download-btn:hover {
    background: red;
    color: black;
    box-shadow: 0 0 10px red;
  }
</style>
</head>

<body>

<div class="vault-container">

  <div class="vault-door"></div>

  <h1>CARLOS'S VAULT</h1>

  <div class="game">
    <span>Bloons TD 6</span>
    <a class="download-btn" href="#">Download</a>
  </div>

  <div class="game">
    <span>Minecraft</span>
    <a class="download-btn" href="#">Download</a>
  </div>

  <div class="game">
    <span>Hollow Knight: Silksong</span>
    <a class="download-btn" href="#">Download</a>
  </div>

  <div class="game">
    <span>Hollow Knight</span>
    <a class="download-btn" href="#">Download</a>
  </div>

  <div class="game">
    <span>Terraria</span>
    <a class="download-btn" href="#">Download</a>
  </div>

</div>

</body>
</html>
